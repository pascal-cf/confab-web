name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # &ci / &actions: anchored scalars so every filter group
          # re-runs when the workflow or composite actions change.
          filters: |
            frontend:
              - 'frontend/**'
              - &ci '.github/workflows/ci.yml'
              - &actions '.github/actions/**'
            backend:
              - 'backend/**'
              - *ci
              - *actions
            docker:
              - 'backend/**'
              - 'Dockerfile'
              - '.dockerignore'
              - 'migrate_db.sh'
              - *ci
              - *actions

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test -- --run

      - name: Build Storybook
        working-directory: frontend
        run: npm run build-storybook

  backend-unit:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: backend/go.sum

      - name: Unit tests
        working-directory: backend
        run: go test -short -timeout 15m ./...

  discover-packages:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: backend/go.sum

      - name: Discover testable packages
        id: list
        working-directory: backend
        run: |
          packages=$(./scripts/list-test-packages.sh --json)
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "$packages" | jq length) testable packages"

  backend-integration:
    needs: [changes, discover-packages]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover-packages.outputs.packages) }}

    name: backend-integration (${{ matrix.package }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker Hub mirror
        uses: ./.github/actions/docker-mirror

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: backend/go.sum

      - name: Integration tests
        working-directory: backend
        run: go test -timeout 15m ${{ matrix.package }}

  docker-smoke-test:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker Hub mirror
        uses: ./.github/actions/docker-mirror

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: confab-test:latest

      - name: Smoke test - server binary
        run: docker run --rm confab-test:latest test -x ./confab

      - name: Smoke test - migrate binary
        run: docker run --rm confab-test:latest migrate -help

      - name: Smoke test - migrate wrapper
        run: |
          docker run --rm confab-test:latest sh -c '
            # Should fail with missing DATABASE_URL
            if ./migrate_db.sh 2>&1; then
              echo "Expected migrate_db.sh to fail without DATABASE_URL"
              exit 1
            fi
          '

      - name: Smoke test - migration files present
        run: docker run --rm confab-test:latest ls /app/migrations/

  ci-summary:
    if: always()
    needs: [changes, frontend, backend-unit, discover-packages, backend-integration, docker-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          # Path-filtered jobs report "skipped" when their paths didn't change.
          # Treat skipped as success so ci-summary still passes for unrelated changes.
          # "changes" has no `if:` so it can't be skipped in practice — the same
          # check covers it.
          fail=0
          check() {
            local name=$1 result=$2
            echo "  $name: $result"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              fail=1
            fi
          }
          check "changes" "${{ needs.changes.result }}"
          check "frontend" "${{ needs.frontend.result }}"
          check "backend-unit" "${{ needs.backend-unit.result }}"
          check "discover-packages" "${{ needs.discover-packages.result }}"
          check "backend-integration" "${{ needs.backend-integration.result }}"
          check "docker-smoke-test" "${{ needs.docker-smoke-test.result }}"
          if [[ $fail -ne 0 ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All required jobs passed (or skipped due to path filters)"
