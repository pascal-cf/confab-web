name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test -- --run

      - name: Build Storybook
        working-directory: frontend
        run: npm run build-storybook

  backend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache-dependency-path: backend/go.sum

      - name: Unit tests
        working-directory: backend
        run: go test -short -timeout 15m ./...

  discover-packages:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache-dependency-path: backend/go.sum

      - name: Discover testable packages
        id: list
        working-directory: backend
        run: |
          packages=$(./scripts/list-test-packages.sh --json)
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "$packages" | jq length) testable packages"

  backend-integration:
    needs: discover-packages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover-packages.outputs.packages) }}

    name: backend-integration (${{ matrix.package }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker Hub mirror
        uses: ./.github/actions/docker-mirror

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache-dependency-path: backend/go.sum

      - name: Integration tests
        working-directory: backend
        run: go test -timeout 15m ${{ matrix.package }}

  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Docker Hub mirror
        uses: ./.github/actions/docker-mirror

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: confab-test:latest

      - name: Smoke test - server binary
        run: docker run --rm confab-test:latest test -x ./confab

      - name: Smoke test - migrate binary
        run: docker run --rm confab-test:latest migrate -help

      - name: Smoke test - migrate wrapper
        run: |
          docker run --rm confab-test:latest sh -c '
            # Should fail with missing DATABASE_URL
            if ./migrate_db.sh 2>&1; then
              echo "Expected migrate_db.sh to fail without DATABASE_URL"
              exit 1
            fi
          '

      - name: Smoke test - migration files present
        run: docker run --rm confab-test:latest ls /app/migrations/

  ci-summary:
    if: always()
    needs: [frontend, backend-unit, discover-packages, backend-integration, docker-smoke-test]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.frontend.result }}" != "success" ||
                "${{ needs.backend-unit.result }}" != "success" ||
                "${{ needs.discover-packages.result }}" != "success" ||
                "${{ needs.backend-integration.result }}" != "success" ||
                "${{ needs.docker-smoke-test.result }}" != "success" ]]; then
            echo "One or more jobs failed:"
            echo "  frontend: ${{ needs.frontend.result }}"
            echo "  backend-unit: ${{ needs.backend-unit.result }}"
            echo "  discover-packages: ${{ needs.discover-packages.result }}"
            echo "  backend-integration: ${{ needs.backend-integration.result }}"
            echo "  docker-smoke-test: ${{ needs.docker-smoke-test.result }}"
            exit 1
          fi
          echo "All jobs passed!"
