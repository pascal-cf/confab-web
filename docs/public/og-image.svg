<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Lobster&amp;display=swap');
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative dot grid -->
  <g fill="#334155" opacity="0.4">
    <circle cx="80" cy="80" r="2"/>
    <circle cx="160" cy="80" r="2"/>
    <circle cx="240" cy="80" r="2"/>
    <circle cx="1040" cy="550" r="2"/>
    <circle cx="1120" cy="550" r="2"/>
    <circle cx="1040" cy="470" r="2"/>
    <circle cx="1120" cy="470" r="2"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="300" font-family="Lobster, cursive" font-size="160" fill="#f8fafc" text-anchor="middle">Confabulous</text>

  <!-- Tagline -->
  <text x="600" y="380" font-size="34" fill="#cbd5e1" text-anchor="middle">
    Open-source analytics for your Claude Code and Codex sessions
  </text>

  <!-- URL -->
  <text x="600" y="470" font-size="26" font-weight="500" fill="#64748b" text-anchor="middle" letter-spacing="0.05em">
    docs.confabulous.dev
  </text>
</svg>
